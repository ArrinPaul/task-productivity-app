<div class="category-list-container">
  <div class="header">
    <h2>Categories</h2>
    <button mat-raised-button color="primary" (click)="openCategoryForm()">
      <mat-icon>add</mat-icon>
      Add Category
    </button>
  </div>

  <mat-list>
    @for (category of categories; track category.id) {
      <mat-list-item>
        <span matListItemTitle>{{ category.name }}</span>
        <div class="actions">
          <button mat-icon-button (click)="openCategoryForm(category)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteCategory(category.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </mat-list-item>
    }
  </mat-list>
</div>
