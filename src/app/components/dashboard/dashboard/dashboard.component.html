<div class="dashboard-container">
  <h1>Dashboard</h1>
  <div class="stats-container">
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Total Tasks</mat-card-title>
        <mat-icon>list</mat-icon>
      </mat-card-header>
      <mat-card-content>
        <p class="stat-number">{{ totalTasks }}</p>
      </mat-card-content>
    </mat-card>
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Completed Tasks</mat-card-title>
        <mat-icon>check_circle</mat-icon>
      </mat-card-header>
      <mat-card-content>
        <p class="stat-number">{{ completedTasks }}</p>
      </mat-card-content>
    </mat-card>
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Pending Tasks</mat-card-title>
        <mat-icon>pending</mat-icon>
      </mat-card-header>
      <mat-card-content>
        <p class="stat-number">{{ pendingTasks }}</p>
      </mat-card-content>
    </mat-card>
    <mat-card class="stat-card">
      <mat-card-header>
        <mat-card-title>Productivity</mat-card-title>
        <mat-icon>trending_up</mat-icon>
      </mat-card-header>
      <mat-card-content>
        <p class="stat-number">{{ productivityPercentage | number: '1.0-0' }}%</p>
      </mat-card-content>
    </mat-card>
  </div>
  <div class="chart-container">
    <ngx-charts-pie-chart
      [results]="taskPriorityData"
      [legend]="true"
      [labels]="true"
      [doughnut]="true"
      [arcWidth]="0.5">
    </ngx-charts-pie-chart>
  </div>
  <div class="chart-container">
    <ngx-charts-pie-chart
      [results]="taskCategoryData"
      [legend]="true"
      [labels]="true"
      [doughnut]="true"
      [arcWidth]="0.5">
    </ngx-charts-pie-chart>
  </div>
</div>
