<div class="performance-container">
  <h2>Weekly Performance</h2>
  <div class="chart-container">
    <ngx-charts-bar-vertical
      [results]="weeklyPerformanceData"
      [xAxis]="true"
      [yAxis]="true"
      [legend]="true"
      [showXAxisLabel]="true"
      [showYAxisLabel]="true"
      xAxisLabel="Week"
      yAxisLabel="Completed Tasks">
    </ngx-charts-bar-vertical>
  </div>
</div>
