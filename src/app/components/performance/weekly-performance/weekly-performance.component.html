<div class="performance-container">
  <h2>Weekly Performance</h2>
  
  <div class="charts-grid">
    <!-- Last 4 Weeks Performance -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>calendar_month</mat-icon>
          Last 4 Weeks
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          @if (weeklyPerformanceData.length > 0) {
            <ngx-charts-bar-vertical
              [results]="weeklyPerformanceData"
              [view]="view"
              [xAxis]="showXAxis"
              [yAxis]="showYAxis"
              [gradient]="gradient"
              [legend]="showLegend"
              [showXAxisLabel]="showXAxisLabel"
              [showYAxisLabel]="showYAxisLabel"
              [xAxisLabel]="xAxisLabel"
              [yAxisLabel]="yAxisLabel"
              [scheme]="colorScheme">
            </ngx-charts-bar-vertical>
          } @else {
            <div class="no-data">
              <mat-icon>bar_chart</mat-icon>
              <p>No completed tasks in the last 4 weeks</p>
            </div>
          }
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Current Week Daily Performance -->
    <mat-card class="chart-card">
      <mat-card-header>
        <mat-card-title>
          <mat-icon>today</mat-icon>
          This Week (Daily)
        </mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <div class="chart-container">
          @if (dailyPerformanceData.length > 0) {
            <ngx-charts-line-chart
              [results]="[{ name: 'This Week', series: dailyPerformanceData }]"
              [view]="view"
              [xAxis]="showXAxis"
              [yAxis]="showYAxis"
              [gradient]="gradient"
              [legend]="showLegend"
              [showXAxisLabel]="showXAxisLabel"
              [showYAxisLabel]="showYAxisLabel"
              [xAxisLabel]="'Day'"
              [yAxisLabel]="yAxisLabel"
              [scheme]="colorScheme">
            </ngx-charts-line-chart>
          } @else {
            <div class="no-data">
              <mat-icon>show_chart</mat-icon>
              <p>No completed tasks this week</p>
            </div>
          }
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
